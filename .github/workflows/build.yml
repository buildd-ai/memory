name: Build & Check

on:
  push:
    branches: [dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for uncommitted migrations
        run: |
          if [ -n "$(git status drizzle/ --porcelain)" ]; then
            echo "::error::Uncommitted migration files detected in drizzle/"
            git status drizzle/ --porcelain
            exit 1
          fi

      - name: Type check
        run: bunx tsc --noEmit

      - name: Build
        run: bun run build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
